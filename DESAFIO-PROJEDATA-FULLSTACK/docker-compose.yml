services:
  db:
    image: gvenzl/oracle-free:slim
    container_name: inventory-db-oracle
    restart: always
    environment:
      - ORACLE_PASSWORD=${ORACLE_PWD:-123}
      - APP_USER=admin
      - APP_USER_PASSWORD=123
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata

volumes:
  oracle_data: