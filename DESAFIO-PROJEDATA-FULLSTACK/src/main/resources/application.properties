# Porta do Backend
quarkus.http.port=8081
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# Configurações para a imagem gvenzl/oracle-free
quarkus.datasource.db-kind=oracle
quarkus.datasource.username=${DB_USERNAME:system}
quarkus.datasource.password=${DB_PASSWORD:123}
quarkus.datasource.jdbc.url=jdbc:oracle:thin:@${DB_HOST:localhost}:${DB_PORT:1521}/${DB_NAME:FREEPDB1}

# Timeout e Performance
quarkus.datasource.jdbc.acquisition-timeout=30

# Hibernate
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true

# Desabilitar Dev Services
quarkus.devservices.enabled=false