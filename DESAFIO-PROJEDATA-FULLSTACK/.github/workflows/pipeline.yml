name: Projedata Inventory Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build Backend (Quarkus)
        run: mvn clean package -DskipTests 

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: cd frontend && npm install

      - name: Run E2E Tests (Cypress)
        uses: cypress-io/github-action@v6
        env:
          # Injetando a senha do banco para o Quarkus conseguir subir no CI
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USERNAME: system
        with:
          working-directory: frontend
          # mvn quarkus:dev rodando da raiz (../pom.xml)
          # porta do backend para 8081 conforme seu application.properties
          start: mvn -f ../pom.xml quarkus:dev, npm run dev
          wait-on: 'http://localhost:8081/products, http://localhost:5173'

  deploy-frontend:
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and Build
        run: |
          cd frontend
          npm install
          npm run build
          
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist